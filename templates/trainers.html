{% extends "base.html" %}
{% block content %}

<h1>Trainers</h1>
<table>
    <tr>
        <th>First Name</th>
        <th>Last Name</th>
        <th>Speciality</th>
    </tr>
    {% for trainer in trainers %}
    <tr>
        <td>{{ trainer[1] }}</td>
        <td>{{ trainer[2] }}</td>
        <td>{{ trainer[3] }}</td>
    </tr>
    {% endfor %}
</table>
{% endblock %}
